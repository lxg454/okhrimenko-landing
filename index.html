<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Александр Охрименко</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --accent1: #f97316;
      --accent2: #fb923c;
      --accent3: #ea580c;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ── Фоновые частицы ── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    .bg-orb-1 {
      width: 600px; height: 600px;
      background: var(--accent1);
      top: -150px; left: -200px;
      animation: drift1 18s ease-in-out infinite alternate;
    }
    .bg-orb-2 {
      width: 500px; height: 500px;
      background: var(--accent2);
      bottom: -100px; right: -150px;
      animation: drift2 22s ease-in-out infinite alternate;
    }
    .bg-orb-3 {
      width: 300px; height: 300px;
      background: var(--accent3);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation: drift3 14s ease-in-out infinite alternate;
    }

    @keyframes drift1 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(60px, 40px) scale(1.1); }
    }
    @keyframes drift2 {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(-50px, -30px) scale(1.15); }
    }
    @keyframes drift3 {
      from { transform: translate(-50%, -50%) scale(1); }
      to   { transform: translate(-48%, -52%) scale(1.2); }
    }

    /* ── Карточка ── */
    .card {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 56px 48px 48px;
      max-width: 560px;
      width: 90%;
    }

    /* ── Аватар-заглушка ── */
    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 32px;
      box-shadow:
        0 0 0 3px #0a0a0a,
        0 0 0 5px rgba(249,115,22,0.4),
        0 0 40px rgba(249,115,22,0.25);
      animation: avatar-pulse 4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes avatar-pulse {
      0%, 100% { box-shadow: 0 0 0 3px #0a0a0a, 0 0 0 5px rgba(249,115,22,0.4), 0 0 40px rgba(249,115,22,0.2); }
      50%       { box-shadow: 0 0 0 3px #0a0a0a, 0 0 0 5px rgba(249,115,22,0.7), 0 0 70px rgba(249,115,22,0.4); }
    }

    /* ── Имя ── */
    .name {
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.1;
      background: linear-gradient(90deg, var(--accent1) 0%, var(--accent2) 50%, var(--accent3) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      background-size: 200%;
      animation: gradient-shift 6s ease-in-out infinite alternate;
      filter: drop-shadow(0 0 20px rgba(249,115,22,0.45));
      margin-bottom: 12px;
    }

    @keyframes gradient-shift {
      from { background-position: 0%; }
      to   { background-position: 100%; }
    }

    /* ── Специализация ── */
    .role {
      font-size: 1.05rem;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 36px;
    }

    /* ── Разделитель ── */
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent1), var(--accent2));
      border-radius: 2px;
      margin-bottom: 36px;
      opacity: 0.6;
    }

    /* ── Соцсети ── */
    .socials {
      display: flex;
      gap: 20px;
      margin-bottom: 40px;
    }

    .social-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      text-decoration: none;
      transition: transform 0.25s ease, background 0.25s ease, color 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .social-link svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    .social-link:hover {
      transform: translateY(-5px) scale(1.08);
      background: rgba(249,115,22,0.12);
      border-color: rgba(249,115,22,0.4);
      color: var(--accent1);
      box-shadow: 0 8px 30px rgba(249,115,22,0.25);
    }

    .social-link.tg:hover  { background: rgba(251,146,60,0.12); border-color: rgba(251,146,60,0.4); color: var(--accent2); box-shadow: 0 8px 30px rgba(251,146,60,0.25); }
    .social-link.inst:hover { background: rgba(234,88,12,0.12); border-color: rgba(234,88,12,0.4); color: var(--accent3); box-shadow: 0 8px 30px rgba(234,88,12,0.25); }
    .social-link.yt:hover  { background: rgba(249,115,22,0.12); border-color: rgba(249,115,22,0.4); color: var(--accent1); box-shadow: 0 8px 30px rgba(249,115,22,0.25); }

    /* ── CTA-кнопка ── */
    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 36px;
      border-radius: 50px;
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(135deg, var(--accent1), var(--accent2));
      border: none;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 24px rgba(249,115,22,0.35);
    }

    .cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .cta:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 10px 40px rgba(249,115,22,0.5); }
    .cta:hover::before { opacity: 1; }
    .cta:active { transform: translateY(0) scale(0.98); }

    /* пульс вокруг кнопки */
    .cta-wrap {
      position: relative;
    }
    .cta-wrap::before, .cta-wrap::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 56px;
      border: 1.5px solid rgba(249,115,22,0.35);
      animation: ring-pulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    .cta-wrap::after {
      inset: -12px;
      border-color: rgba(249,115,22,0.18);
      animation-delay: 0.6s;
    }

    @keyframes ring-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0; transform: scale(1.08); }
    }

    .cta svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── Нижняя метка ── */
    .footer-label {
      margin-top: 48px;
      font-size: 0.75rem;
      color: rgba(100,116,139,0.5);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    /* ── Адаптив ── */
    @media (max-width: 480px) {
      .card { padding: 40px 24px 36px; }
      .avatar { width: 90px; height: 90px; font-size: 34px; }
      .social-link { width: 46px; height: 46px; border-radius: 12px; }
      .cta { padding: 14px 28px; font-size: 1rem; }
    }
  </style>
</head>
<body>
